<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Snake Shahmaran PRO+</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at 30% 20%, #1a1a2e, #0f172a 60%, #000);
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: none;
}

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(34,197,94,0.12), transparent 60%);
  animation: pulse 6s infinite ease-in-out;
  pointer-events: none;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.25; }
  50% { transform: scale(1.15); opacity: 0.5; }
  100% { transform: scale(1); opacity: 0.25; }
}

@keyframes glow {
  0%, 100% { text-shadow: 0 0 10px rgba(34,197,94,0.5); }
  50% { text-shadow: 0 0 20px rgba(34,197,94,1); }
}

@keyframes slideIn {
  from { transform: translateY(-20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes bounce {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}

@keyframes swipeHint {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

.main-container {
  display: flex;
  gap: 20px;
  z-index: 2;
  max-width: 1600px;
  width: 100%;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px;
}

.game-section {
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}

.canvas-container {
  position: relative;
  display: inline-block;
}

canvas {
  background: #020617;
  box-shadow: 0 0 30px rgba(0,255,150,0.25);
  border-radius: 12px;
  transition: transform 0.05s;
  width: 400px;
  height: 400px;
  display: block;
  touch-action: none;
}

.swipe-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: rgba(34,197,94,0.3);
  font-size: 14px;
  pointer-events: none;
  animation: swipeHint 2s infinite;
  display: none;
}

.swipe-hint.show {
  display: block;
}

.ui {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(34,197,94,0.2);
}

.ui-row {
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.ui-row label {
  font-weight: bold;
  color: #4ade80;
}

.ui-row div {
  font-size: 14px;
}

.hearts { font-size: 22px; }

.power-up-display {
  display: flex;
  gap: 8px;
  margin: 10px 0;
  min-height: 35px;
  flex-wrap: wrap;
}

.power-up-item {
  background: rgba(100,200,255,0.3);
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 12px;
  border: 1px solid rgba(100,200,255,0.6);
  animation: slideIn 0.3s ease;
}

button {
  margin: 5px;
  padding: 10px 15px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: all 0.3s;
  -webkit-tap-highlight-color: transparent;
}

button:hover {
  background: #16a34a;
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(34,197,94,0.4);
}

button:active {
  transform: translateY(0);
}

.button-group {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin: 10px 0;
  justify-content: center;
}

.share-button {
  background: #3b82f6;
  margin: 3px;
  padding: 8px 12px;
  font-size: 12px;
}

.share-button:hover {
  background: #2563eb;
}

.leaderboard {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(34,197,94,0.2);
  width: 300px;
  max-height: 500px;
  overflow-y: auto;
}

.leaderboard h3 {
  margin: 0 0 15px 0;
  color: #4ade80;
  text-align: center;
  animation: glow 2s infinite;
}

.leaderboard-entry {
  display: flex;
  justify-content: space-between;
  padding: 8px;
  margin: 5px 0;
  background: rgba(34,197,94,0.1);
  border-radius: 6px;
  border-left: 3px solid #22c55e;
  font-size: 13px;
}

.leaderboard-rank {
  font-weight: bold;
  color: #facc15;
  min-width: 25px;
}

.leaderboard-name {
  flex: 1;
  margin: 0 10px;
  color: #4ade80;
}

.leaderboard-score {
  text-align: right;
  color: #a3e635;
}

.leaderboard-empty {
  text-align: center;
  color: #888;
  padding: 20px;
}

.achievements-panel {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(34,197,94,0.2);
  width: 300px;
  max-height: 500px;
  overflow-y: auto;
}

.achievements-panel h3 {
  margin: 0 0 15px 0;
  color: #facc15;
  text-align: center;
  animation: glow 2s infinite;
}

.achievement-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  margin: 8px 0;
  background: rgba(255,193,7,0.1);
  border-radius: 6px;
  border-left: 3px solid #facc15;
  font-size: 12px;
  transition: all 0.3s;
}

.achievement-item.unlocked {
  background: rgba(34,197,94,0.2);
  border-left-color: #22c55e;
  animation: bounce 0.5s ease;
}

.achievement-item.locked {
  opacity: 0.5;

  border-left-color: #666;
}

.achievement-icon {
  font-size: 24px;

}

.achievement-info {
  flex: 1;
}

.achievement-name {
  font-weight: bold;
  color: #facc15;
}

.achievement-description {
  font-size: 11px;
  color: #aaa;
  margin-top: 3px;
}

.achievement-progress {
  font-size: 11px;
  color: #4ade80;
  margin-top: 3px;
}

.achievement-empty {
  text-align: center;
  color: #888;
  padding: 20px;
}

.settings-panel {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(34,197,94,0.2);
  width: 300px;
}

.settings-panel h3 {
  margin: 0 0 15px 0;
  color: #4ade80;
}

.setting-item {
  margin: 10px 0;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}

.setting-item input[type="checkbox"],
.setting-item input[type="range"] {
  cursor: pointer;
}

.setting-item label {
  flex: 1;
}

.setting-item select {
  padding: 5px;
  border-radius: 4px;
  background: #1a1a2e;
  color: #4ade80;
  border: 1px solid #22c55e;
}

.player-name-input {

  border: 1px solid #22c55e;
  background: #1a1a2e;
  color: #4ade80;
  margin-bottom: 10px;
  font-size: 14px;
}

.notification {
  position: fixed;
  top: 20px;
  right: 20px;
  background: rgba(34,197,94,0.9);
  padding: 15px 20px;
  border-radius: 8px;
  color: white;
  font-weight: bold;
  animation: slideIn 0.3s ease;
  z-index: 1000;
  max-width: 300px;
}

.notification.success { background: rgba(34,197,94,0.9); }
.notification.error { background: rgba(239,68,68,0.9); }
.notification.info { background: rgba(59,130,246,0.9); }

.achievement-unlock-notification {
  position: fixed;
  bottom: 20px;
  right: 20px;

  padding: 20px;
  border-radius: 8px;
  color: #000;
  font-weight: bold;
  animation: slideIn 0.5s ease, bounce 0.5s ease;
  z-index: 1001;
  max-width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(245,158,11,0.4);
}

.share-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

.share-modal.active {

}

.share-modal-content {
  background: rgba(26,26,46,0.95);
  padding: 30px;
  border-radius: 12px;
  border: 2px solid #22c55e;

  width: 90%;

}

.share-modal-content h2 {

}

.share-option {
  display: flex;
  gap: 10px;
  margin: 10px 0;
  flex-wrap: wrap;
}

.share-option button {

  background: #3b82f6;
  padding: 12px;

}

.share-option button:hover {

}

.share-text {
  background: #1a1a2e;
  padding: 10px;
  border: 1px solid #22c55e;
  border-radius: 6px;
  color: #4ade80;
  margin: 10px 0;
  word-break: break-all;
  font-size: 12px;
}

.close-modal {

  float: right;
  padding: 5px 10px !important;
  margin: 0 !important;

  }

<script>
// ================= VIBRATION API =================
class VibrationManager {
  constructor() {
    this.enabled = true;
    this.supported = 'vibrate' in navigator;
  }

  vibrate(pattern = 50) {
    if (this.enabled && this.supported) {
      navigator.vibrate(pattern);
    }
  }

  pulse() {
    this.vibrate([30, 30, 30]);
  }

  success() {
    this.vibrate([50]);
  }

  error() {
    this.vibrate([100, 50, 100]);
  }

  toggle() {
    this.enabled = !this.enabled;
  }
}

// ================= TOUCH CONTROL SYSTEM =================
class TouchController {
  constructor() {
    this.startX = 0;
    this.startY = 0;
    this.endX = 0;
    this.endY = 0;
    this.minSwipeDistance = 30;
    this.setupTouchListeners();
  }

  setupTouchListeners() {
    document.addEventListener('touchstart', (e) => this.handleTouchStart(e), false);
    document.addEventListener('touchmove', (e) => this.handleTouchMove(e), false);
    document.addEventListener('touchend', (e) => this.handleTouchEnd(e), false);
  }

  handleTouchStart(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    
    this.startX = e.touches[0].clientX;
    this.startY = e.touches[0].clientY;
  }

  handleTouchMove(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    e.preventDefault();
  }

  handleTouchEnd(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    
    this.endX = e.changedTouches[0].clientX;
    this.endY = e.changedTouches[0].clientY;
    this.detectSwipe();
  }

  detectSwipe() {
    const deltaX = this.endX - this.startX;
    const deltaY = this.endY - this.startY;

    const absDeltaX = Math.abs(deltaX);
    const absDeltaY = Math.abs(deltaY);

    if (absDeltaX < this.minSwipeDistance && absDeltaY < this.minSwipeDistance) {
      return;
    }

    if (absDeltaX > absDeltaY) {
      if (deltaX > 0) {
        this.handleSwipe('RIGHT');
      } else {
        this.handleSwipe('LEFT');
      }
    } else {
      if (deltaY > 0) {
        this.handleSwipe('DOWN');
      } else {
        this.handleSwipe('UP');
      }
    }
  }

  handleSwipe(direction) {
    if (direction === 'UP' && direction !== 'DOWN') direction = 'UP';
    if (direction === 'DOWN' && direction !== 'UP') direction = 'DOWN';
    if (direction === 'LEFT' && direction !== 'RIGHT') direction = 'LEFT';
    if (direction === 'RIGHT' && direction !== 'LEFT') direction = 'RIGHT';

    // Update global direction
    if (direction === 'UP' && globalDirection !== 'DOWN') globalDirection = 'UP';
    if (direction === 'DOWN' && globalDirection !== 'UP') globalDirection = 'DOWN';
    if (direction === 'LEFT' && globalDirection !== 'RIGHT') globalDirection = 'LEFT';
    if (direction === 'RIGHT' && globalDirection !== 'LEFT') globalDirection = 'RIGHT';

    vibrationManager.vibrate(20);
  }
}

// ================= AUDIO SYSTEM =================
class AudioManager {
  constructor() {
    this.enabled = true;
    this.volume = 0.5;
    this.sounds = {};
    this.createSounds();
  }

  createSounds() {
    this.sounds.eat = this.createTone(800, 0.1, 'sine');
    this.sounds.crash = this.createTone(300, 0.15, 'sine');
    this.sounds.levelUp = this.createLevelUpSound();
    this.sounds.gameOver = this.createGameOverSound();
    this.sounds.powerUp = this.createTone(1200, 0.1, 'sine');
  }

  createTone(frequency, duration, type = 'sine') {
    return () => {
      if (!this.enabled) return;
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = frequency;
        oscillator.type = type;
        
        gainNode.gain.setValueAtTime(this.volume, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration);
      } catch (e) {
        // Fallback if audio context fails
      }
    };
  }

  createLevelUpSound() {
    return () => {
      if (!this.enabled) return;
      const frequencies = [523, 659, 784, 1047];
      frequencies.forEach((freq, i) => {
        setTimeout(() => this.createTone(freq, 0.1)(), i * 100);
      });
    };
  }

  createGameOverSound() {
    return () => {
      if (!this.enabled) return;
      const frequencies = [392, 349, 329, 293];
      frequencies.forEach((freq, i) => {
        setTimeout(() => this.createTone(freq, 0.15)(), i * 150);
      });
    };
  }

  play(soundName) {
    if (this.sounds[soundName]) {
      this.sounds[soundName]();
    }
  }

  setVolume(value) {
    this.volume = value;
  }

  toggle() {
    this.enabled = !this.enabled;
  }
}

// ================= POWER-UP SYSTEM =================
class PowerUpManager {
  constructor() {
    this.activePowerUps = [];
    this.powerUpTypes = {
      SHIELD: { name: '🛡️ Shield', duration: 300, color: 'blue', chance: 0.15 },
      SPEED_BOOST: { name: '⚡ Speed Boost', duration: 200, color: 'yellow', chance: 0.1 },
      FREEZE: { name: '❄️ Freeze', duration: 150, color: 'cyan', chance: 0.08 },
      MAGNET: { name: '🧲 Magnet', duration: 250, color: 'purple', chance: 0.1 }
    };
  }

  spawnPowerUp() {
    const types = Object.keys(this.powerUpTypes);
    const randomType = types[Math.floor(Math.random() * types.length)];
    const chance = Math.random();
    
    if (chance < this.powerUpTypes[randomType].chance) {
      return {
        type: randomType,
        x: Math.floor(Math.random() * 20),
        y: Math.floor(Math.random() * 20),
        timeLeft: this.powerUpTypes[randomType].duration
      };
    }
    return null;
  }

  activatePowerUp(type) {
    const powerUp = {
      type: type,
      timeLeft: this.powerUpTypes[type].duration
    };
    this.activePowerUps.push(powerUp);
    audioManager.play('powerUp');
  }

  updatePowerUps() {
    this.activePowerUps = this.activePowerUps.filter(p => {
      p.timeLeft--;
      return p.timeLeft > 0;
    });
  }

  hasPowerUp(type) {
    return this.activePowerUps.some(p => p.type === type);
  }

  getPowerUpTimeLeft(type) {
    const powerUp = this.activePowerUps.find(p => p.type === type);
    return powerUp ? powerUp.timeLeft : 0;
  }

  clear() {
    this.activePowerUps = [];
  }

  getDisplayInfo() {
    return this.activePowerUps.map(p => {
      const info = this.powerUpTypes[p.type];
      return `${info.name} (${Math.ceil(p.timeLeft / 10)}s)`;
    });
  }
}

    });

    list.innerHTML = html;
  }

    Object.keys(this.achievements).forEach(key => {
      this.achievements[key].unlocked = false;
    });
    localStorage.removeItem('snakeAchievements');
  }
}

      showNotification('⏸ Paused', 'info');
    } else {
      gameInterval = setInterval(loop, gameSpeed);

    }
  }
}

  clearInterval(gameInterval);
  initGame();
  isRunning = false;
  showNotification('🔄 Restarted', 'info');
}

// ================= LOGIC =================
function randomFood() {
  let newFood;
  do {
    newFood = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
  } while (snake.some(s => s.x === newFood.x && s.y === newFood.y) || 
           obstacles.some(o => o.x === newFood.x && o.y === newFood.y));
  return newFood;
}

function spawnObstacle() {
  let obstacle;
  do {
    obstacle = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
  } while (snake.some(s => s.x === obstacle.x && s.y === obstacle.y) || 
           obstacles.some(o => o.x === obstacle.x && o.y === obstacle.y));
  obstacles.push(obstacle);
}

function spawnPowerUp() {
  const powerUp = powerUpManager.spawnPowerUp();
  if (powerUp) {
    let attempts = 0;
    while (attempts < 10) {
      powerUp.x = Math.floor(Math.random() * 20);
      powerUp.y = Math.floor(Math.random() * 20);
      
      if (!snake.some(s => s.x === powerUp.x && s.y === powerUp.y) &&
          !obstacles.some(o => o.x === powerUp.x && o.y === powerUp.y)) {
        powerUps.push(powerUp);
        return;
      }
      attempts++;
    }
  }
}

// ================= SCORE / LEVEL =================
function increaseScore() {
  score++;
  updateScore();

  let newLevel = Math.floor(score / 5) + 1;

  if (newLevel !== level) {
    level = newLevel;
    updateLevel();

    spawnObstacle();
    spawnPowerUp();

    gameSpeed = Math.max(50, gameSpeed - 10);

    if (isRunning && !isPaused) {
      clearInterval(gameInterval);
      gameInterval = setInterval(loop, gameSpeed);
    }

    audioManager.play('levelUp');
    vibrationManager.vibrate([50, 30, 50]);
    showNotification(`⭐ Level ${level}!`, 'success');
  }

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("snakeHigh", highScore);
    updateHigh();
  }
}

// ================= HP =================
function decreaseHP() {
  if (powerUpManager.hasPowerUp('SHIELD')) {
    powerUpManager.activePowerUps = powerUpManager.activePowerUps.filter(p => p.type !== 'SHIELD');
    showNotification('🛡️ Shield!', 'info');
    updatePowerUpDisplay();
    audioManager.play('crash');
    vibrationManager.vibrate(30);
    return;
  }

  hp--;
  updateHP();
  shakeTime = 10;
  audioManager.play('crash');
  vibrationManager.error();

  if (hp <= 0) {
    gameOver();
  }
}

function gameOver() {
  clearInterval(gameInterval);
  isRunning = false;
  audioManager.play('gameOver');
  vibrationManager.error();

  const playerName = document.getElementById('playerNameInput').value || 'Anonymous';
  leaderboardManager.addEntry(playerName, score, level);
  leaderboardManager.render();

  showNotification(`💀 Game Over! ${score} pts`, 'error');
  
  setTimeout(() => {
    if (confirm(`Game Over!\n\nScore: ${score}\nLevel: ${level}\n\nPlay again?`)) {
      restartGame();
      startGame();
    }
  }, 500);
}

// ================= INPUT =================
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && globalDirection !== "DOWN") globalDirection = "UP";
  if (e.key === "ArrowDown" && globalDirection !== "UP") globalDirection = "DOWN";
  if (e.key === "ArrowLeft" && globalDirection !== "RIGHT") globalDirection = "LEFT";
  if (e.key === "ArrowRight" && globalDirection !== "LEFT") globalDirection = "RIGHT";
});

// ================= LOOP =================
function loop() {
  let head = {...snake[0]};

  if (globalDirection === "UP") head.y--;
  if (globalDirection === "DOWN") head.y++;
  if (globalDirection === "LEFT") head.x--;
  if (globalDirection === "RIGHT") head.x++;

  snake.unshift(head);

  // Food collision
  if (head.x === food.x && head.y === food.y) {
    food = randomFood();
    increaseScore();
    audioManager.play('eat');
    vibrationManager.success();
    spawnPowerUp();
  } else {
    snake.pop();
  }

  // Power-up collision
  const powerUpIndex = powerUps.findIndex(p => p.x === head.x && p.y === head.y);
  if (powerUpIndex !== -1) {
    const powerUp = powerUps.splice(powerUpIndex, 1)[0];
    powerUpManager.activatePowerUp(powerUp.type);
    totalPowerUpsCollected++;
    updatePowerUpDisplay();
  }

  // Update power-ups
  powerUpManager.updatePowerUps();
  updatePowerUpDisplay();

  // Obstacle collision
  if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
    if (!powerUpManager.hasPowerUp('FREEZE')) {
      decreaseHP();
    }
  }

  // Wall/self collision
  let crash =
    head.x < 0 || head.y < 0 ||
    head.x >= 20 || head.y >= 20 ||
    snake.slice(1).some(s => s.x === head.x && s.y === head.y);

  if (crash) {
    if (powerUpManager.hasPowerUp('SHIELD')) {
      powerUpManager.activePowerUps = powerUpManager.activePowerUps.filter(p => p.type !== 'SHIELD');
      snake = [{x: 10, y: 10}];
      updatePowerUpDisplay();
      showNotification('🛡️ Shield!', 'info');
    } else {
      decreaseHP();
      snake = [{x: 10, y: 10}];
    }
  }

  // Magnet effect
  if (powerUpManager.hasPowerUp('MAGNET')) {
    const distance = Math.abs(head.x - food.x) + Math.abs(head.y - food.y);
    if (distance <= 3) {
      if (head.x !== food.x) {
        head.x += head.x < food.x ? 1 : -1;
      } else if (head.y !== food.y) {
        head.y += head.y < food.y ? 1 : -1;
      }
    }
  }

  updateUI();
  draw();
}

// ================= DRAW =================
function draw() {
  ctx.clearRect(0, 0, 400, 400);

  if (shakeTime > 0) {
    canvas.style.transform = `translate(${(Math.random() - 0.5) * 10}px,${(Math.random() - 0.5) * 10}px)`;
    shakeTime--;
  } else {
    canvas.style.transform = "translate(0,0)";
  }

  const themeColors = themes[currentTheme].colors;
  const color = themeColors[(level - 1) % themeColors.length];

  ctx.shadowBlur = 15;
  ctx.shadowColor = color;

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? "#ffffff" : color;
    ctx.fillRect(s.x * grid, s.y * grid, grid - 2, grid - 2);
  });

  // Food
  ctx.shadowColor = "#ff0000";
  ctx.fillStyle = "#ff0000";
  ctx.fillRect(food.x * grid, food.y * grid, grid - 2, grid - 2);

  // Power-ups
  powerUps.forEach(p => {
    const icons = {
      SHIELD: '🛡️',
      SPEED_BOOST: '⚡',
      FREEZE: '❄️',
      MAGNET: '🧲'
    };
    ctx.font = '14px Arial';
    ctx.fillText(icons[p.type], p.x * grid + 3, p.y * grid + 15);
  });

  // Obstacles
  ctx.shadowColor = "#888888";
  ctx.fillStyle = "#888888";
  obstacles.forEach(o => {
    ctx.fillRect(o.x * grid, o.y * grid, grid - 2, grid - 2);
  });

  ctx.shadowBlur = 0;
}
